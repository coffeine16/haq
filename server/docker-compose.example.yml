services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=YOUR_SUPABASE_POOLER_HOST   # e.g. aws-1-ap-south-1.pooler.supabase.com
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=postgres
      - DB_POSTGRESDB_USER=postgres.YOUR_SUPABASE_PROJECT_REF
      - DB_POSTGRESDB_PASSWORD=YOUR_SUPABASE_PASSWORD
      - N8N_HOST=YOUR_DOMAIN_OR_DUCKDNS_SUBDOMAIN     # e.g. haq.duckdns.org
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://YOUR_DOMAIN_OR_DUCKDNS_SUBDOMAIN/
      - N8N_SECURE_COOKIE=false
      - N8N_PROXY_HOPS=1
      - GENERIC_TIMEZONE=Asia/Kolkata
      - TZ=Asia/Kolkata
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - pdf

  pdf:
    image: python:3.12-slim
    container_name: pdf
    restart: unless-stopped
    ports:
      - "3200:3200"
    working_dir: /app
    volumes:
      - ./pdf_service:/app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python app.py"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n

volumes:
  n8n_data:
  caddy_data:
  caddy_config:
